    <!-- switch-example.component.html -->
<div>
  <label>Select Color:</label>
  <select [(ngModel)]="selectedColor">
    <option value="red">Red</option>
    <option value="green">Green</option>
    <option value="blue">Blue</option>
  </select>
</div>

<!-- ngSwitch usage -->
<div [ngSwitch]="selectedColor" class="mt-3">
  <p *ngSwitchCase="'red'" style="color: red;">You picked Red! 🔴</p>
  <p *ngSwitchCase="'green'" style="color: green;">You picked Green! 🟢</p>
  <p *ngSwitchCase="'blue'" style="color: blue;">You picked Blue! 🔵</p>
  <p *ngSwitchDefault>Please select a color above.</p>
</div>
